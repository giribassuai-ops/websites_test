<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Test Page</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; }
    p { color: #555; line-height: 1.6; }
    button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #45a049; }
    #output { margin-top: 15px; padding: 10px; background: white; border-left: 4px solid #4CAF50; display: none; }
  </style>
</head>
<body>
  <h1>Sample Test HTML File</h1>
  <p>This is a basic HTML test page. Click the button below to test JavaScript interaction.</p>
  <button onclick="test()">Click Me</button>
  <div id="output">✅ It works! HTML, CSS, and JavaScript are all running correctly.</div>

  <script>
    function test() {
      const output = document.getElementById('output');
      output.style.display = 'block';
    }
  </script>
</body>
</html>
